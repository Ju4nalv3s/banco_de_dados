<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionário</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --accent: #7c6af7;
    --accent2: #f76a8c;
    --green: #3dd68c;
    --red: #f76a8c;
    --text: #e8e8f0;
    --muted: #7a7a90;
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,247,.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(247,106,140,.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown .5s ease both;
  }
  .header .badge {
    display: inline-block;
    font-size: .72rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(124,106,247,.35);
    padding: 4px 14px;
    border-radius: 99px;
    margin-bottom: 14px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: .95rem;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* ─── PROGRESS ─── */
  .progress-bar-wrap {
    height: 4px;
    background: var(--surface2);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 0 99px 99px 0;
    transition: width .45s cubic-bezier(.4,0,.2,1);
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
  }
  .progress-label {
    font-size: .8rem;
    color: var(--muted);
    font-weight: 500;
  }
  .progress-dots {
    display: flex;
    gap: 6px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    transition: background .3s;
  }
  .dot.answered { background: var(--accent); }
  .dot.correct  { background: var(--green); }
  .dot.wrong    { background: var(--red); }

  /* ─── QUESTION AREA ─── */
  .q-area {
    padding: 28px 28px 12px;
  }
  .q-number {
    font-size: .75rem;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .q-text {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  /* ─── OPTIONS ─── */
  .options {
    padding: 16px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .15s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity .2s;
  }
  .option:hover:not(.locked) { border-color: var(--accent); transform: translateX(3px); }
  .option:hover:not(.locked)::before { opacity: .06; }

  .opt-letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--border);
    color: var(--muted);
    font-size: .8rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .25s, color .25s;
    position: relative; z-index: 1;
  }
  .opt-text {
    font-size: .95rem;
    color: var(--text);
    position: relative; z-index: 1;
  }
  .opt-icon {
    margin-left: auto;
    font-size: 1.1rem;
    position: relative; z-index: 1;
    opacity: 0;
    transition: opacity .2s;
  }

  /* States */
  .option.selected { border-color: var(--accent); }
  .option.selected .opt-letter { background: var(--accent); color: #fff; }
  .option.selected::before { opacity: .08; }

  .option.correct { border-color: var(--green); }
  .option.correct .opt-letter { background: var(--green); color: #000; }
  .option.correct::before { background: var(--green); opacity: .08; }
  .option.correct .opt-icon { opacity: 1; }

  .option.wrong { border-color: var(--red); }
  .option.wrong .opt-letter { background: var(--red); color: #fff; }
  .option.wrong::before { background: var(--red); opacity: .08; }
  .option.wrong .opt-icon { opacity: 1; }

  .option.show-correct { border-color: var(--green); animation: pulse .35s ease; }
  .option.show-correct .opt-letter { background: var(--green); color: #000; }
  .option.show-correct::before { background: var(--green); opacity: .06; }

  .option.locked { cursor: default; transform: none !important; }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }

  /* ─── FOOTER NAV ─── */
  .q-footer {
    padding: 16px 28px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    letter-spacing: .04em;
    padding: 10px 22px;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
  }
  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-ghost {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-finish {
    background: linear-gradient(135deg, var(--green), #29b373);
    color: #000;
  }
  .btn:disabled { opacity: .35; cursor: default; transform: none !important; }

  /* ─── START SCREEN ─── */
  #startScreen {
    padding: 40px 32px;
    text-align: center;
  }
  .start-icon {
    font-size: 3.5rem;
    margin-bottom: 20px;
    display: block;
  }
  .start-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 24px 0 32px;
  }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
  }
  .stat-chip strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--accent);
  }
  .stat-chip span {
    font-size: .78rem;
    color: var(--muted);
  }

  /* ─── RESULTS ─── */
  #resultsScreen {
    padding: 40px 32px;
    text-align: center;
    display: none;
  }
  .score-ring {
    position: relative;
    width: 130px; height: 130px;
    margin: 0 auto 24px;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring circle { fill: none; stroke-width: 10; stroke-linecap: round; }
  .ring-bg { stroke: var(--border); }
  .ring-fill { stroke: url(#ringGrad); transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1); }
  .score-label {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-pct {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }
  .score-sub { font-size: .72rem; color: var(--muted); margin-top: 2px; }

  .result-headline {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .result-msg { color: var(--muted); font-size: .95rem; margin-bottom: 28px; }

  .breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
    text-align: center;
  }
  .breakdown-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .breakdown-item strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
  }
  .breakdown-item.ok strong { color: var(--green); }
  .breakdown-item.err strong { color: var(--red); }
  .breakdown-item span { font-size: .78rem; color: var(--muted); }

  /* ─── ANIM ─── */
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .q-anim {
    animation: fadeDown .3s ease both;
  }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <span class="badge">Quiz Interativo</span>
    <h1>Teste seus conhecimentos</h1>
    <p>Responda todas as perguntas e veja seu desempenho.</p>
  </div>

  <div class="card">
    <!-- START -->
    <div id="startScreen">
      <span class="start-icon">🧠</span>
      <div class="start-stats">
        <div class="stat-chip">
          <strong id="totalQCount">47</strong>
          <span>Questões</span>
        </div>
        <div class="stat-chip">
          <strong>Múltipla<br>Escolha</strong>
          <span>Formato</span>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;padding:14px;">
        ▶ Iniciar Questionário
      </button>
    </div>

    <!-- PROGRESS -->
    <div id="quizArea" style="display:none;">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-meta">
        <span class="progress-label" id="progressLabel">Pergunta 1 de 5</span>
        <div class="progress-dots" id="progressDots"></div>
      </div>

      <!-- Q CONTAINER -->
      <div id="qSlot"></div>
    </div>

    <!-- RESULTS -->
    <div id="resultsScreen">
      <svg width="0" height="0">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c6af7"/>
            <stop offset="100%" stop-color="#f76a8c"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="score-ring">
        <svg viewBox="0 0 130 130" width="130" height="130">
          <circle class="ring-bg" cx="65" cy="65" r="55" />
          <circle class="ring-fill" id="ringFill" cx="65" cy="65" r="55"
            stroke-dasharray="345.4"
            stroke-dashoffset="345.4"/>
        </svg>
        <div class="score-label">
          <span class="score-pct" id="scorePct">0%</span>
          <span class="score-sub">pontuação</span>
        </div>
      </div>

      <div class="result-headline" id="resultHeadline"></div>
      <p class="result-msg" id="resultMsg"></p>

      <div class="breakdown">
        <div class="breakdown-item ok">
          <strong id="correctCount">0</strong>
          <span>✓ Corretas</span>
        </div>
        <div class="breakdown-item err">
          <strong id="wrongCount">0</strong>
          <span>✗ Erradas</span>
        </div>
      </div>

      <button class="btn btn-primary" onclick="restartQuiz()" style="width:100%;padding:14px;">
        ↺ Refazer Quiz
      </button>
    </div>
  </div>
</div>

<script>
const questions = [
  {"question":"O que caracteriza o refinamento sucessivo?","options":["Resolver tudo de forma imediata","Aprimorar a solução em etapas progressivas","Evitar revisões","Ignorar testes"],"correct":1},
  {"question":"Qual é o principal objetivo da validação de soluções?","options":["Aumentar a complexidade","Garantir que atende aos requisitos","Reduzir documentação","Evitar testes"],"correct":1},
  {"question":"Um erro comum ao resolver problemas é:","options":["Analisar o contexto","Testar hipóteses","Ignorar o entendimento do problema","Dividir tarefas"],"correct":2},
  {"question":"Visão sistêmica envolve:","options":["Analisar partes isoladas","Ignorar relações","Compreender interações do sistema","Focar apenas no código"],"correct":2},
  {"question":"Feedback loop significa:","options":["Erro no sistema","Retorno de informação ao processo","Código duplicado","Falha de execução"],"correct":1},
  {"question":"Causa-raiz é:","options":["Sintoma visível","Erro superficial","Origem real do problema","Teste falho"],"correct":2},
  {"question":"O diagrama de fluxo serve para:","options":["Executar código","Visualizar etapas de um processo","Compilar programas","Testar software"],"correct":1},
  {"question":"Decomposição ajuda a:","options":["Aumentar dificuldade","Resolver problemas menores separadamente","Ignorar etapas","Eliminar testes"],"correct":1},
  {"question":"Reconhecimento de padrões permite:","options":["Ignorar soluções anteriores","Reaproveitar soluções similares","Aumentar erros","Evitar análise"],"correct":1},
  {"question":"Abstração consiste em:","options":["Focar em detalhes irrelevantes","Ignorar estrutura","Destacar informações importantes","Eliminar lógica"],"correct":2},
  {"question":"Algoritmo é:","options":["Um erro de sistema","Sequência lógica de passos","Código inválido","Interface gráfica"],"correct":1},
  {"question":"Requisitos funcionais definem:","options":["A aparência","As funcionalidades","Os erros","A performance"],"correct":1},
  {"question":"Pseudoalgoritmo serve para:","options":["Executar diretamente","Planejar solução","Testar hardware","Compilar código"],"correct":1},
  {"question":"Tentativa e erro eficiente envolve:","options":["Testar sem critério","Aprender com falhas","Ignorar resultados","Evitar testes"],"correct":1},
  {"question":"Pensamento computacional inclui:","options":["Apenas programação","Estratégias de resolução de problemas","Evitar lógica","Ignorar padrões"],"correct":1},
  {"question":"Um fluxograma representa:","options":["Código executável","Passos de um processo","Erros do sistema","Banco de dados"],"correct":1},
  {"question":"Ishikawa é usado para:","options":["Executar código","Analisar causas","Criar interface","Testar software"],"correct":1},
  {"question":"Erro de raciocínio comum:","options":["Verificar hipóteses","Pular análise","Dividir tarefas","Testar soluções"],"correct":1},
  {"question":"Sistema é:","options":["Parte isolada","Conjunto de elementos interligados","Erro lógico","Código simples"],"correct":1},
  {"question":"Feedback positivo:","options":["Reduz efeitos","Amplifica resultados","Elimina erros","Ignora entrada"],"correct":1},
  {"question":"Feedback negativo:","options":["Amplifica saída","Equilibra sistema","Ignora resultado","Duplica erro"],"correct":1},
  {"question":"Mapear sistema ajuda a:","options":["Confundir solução","Visualizar relações","Eliminar dados","Ignorar fluxo"],"correct":1},
  {"question":"Problema grande deve ser:","options":["Ignorado","Dividido em partes","Resolvido direto","Evitado"],"correct":1},
  {"question":"Teste de solução serve para:","options":["Ignorar erros","Validar funcionamento","Eliminar código","Evitar análise"],"correct":1},
  {"question":"Fluxo representa:","options":["Código","Sequência de etapas","Erro","Interface"],"correct":1},
  {"question":"Pensamento lógico ajuda a:","options":["Criar erros","Resolver problemas","Ignorar dados","Evitar testes"],"correct":1},
  {"question":"Análise de problema inclui:","options":["Ignorar contexto","Entender requisitos","Evitar solução","Pular etapas"],"correct":1},
  {"question":"Solução eficiente é:","options":["Sem testes","Validada e funcional","Complexa","Incompleta"],"correct":1},
  {"question":"Erro lógico ocorre quando:","options":["Código compila","Resultado é incorreto","Não executa","Interface falha"],"correct":1},
  {"question":"Processo iterativo é:","options":["Único passo","Repetição com melhorias","Erro contínuo","Código fixo"],"correct":1},
  {"question":"Solução parcial:","options":["Resolve tudo","Resolve parte do problema","Ignora problema","Elimina análise"],"correct":1},
  {"question":"Análise sistêmica considera:","options":["Parte isolada","Todo o sistema","Erro específico","Código único"],"correct":1},
  {"question":"Estratégia eficaz envolve:","options":["Ignorar testes","Planejamento","Evitar análise","Eliminar dados"],"correct":1},
  {"question":"Teste contínuo ajuda a:","options":["Criar erros","Melhorar qualidade","Ignorar falhas","Evitar solução"],"correct":1},
  {"question":"Problemas complexos exigem:","options":["Soluções rápidas","Análise detalhada","Ignorar etapas","Evitar divisão"],"correct":1},
  {"question":"Fluxograma ajuda a:","options":["Executar código","Entender lógica","Ignorar fluxo","Eliminar etapas"],"correct":1},
  {"question":"Revisão de solução serve para:","options":["Ignorar erros","Aprimorar solução","Eliminar testes","Evitar análise"],"correct":1},
  {"question":"Erro de análise ocorre quando:","options":["Entende problema","Interpreta errado","Testa solução","Divide tarefas"],"correct":1},
  {"question":"Modelo mental ajuda a:","options":["Confundir lógica","Organizar pensamento","Ignorar dados","Eliminar solução"],"correct":1},
  {"question":"Planejamento é importante para:","options":["Evitar erros","Estruturar solução","Ignorar etapas","Eliminar testes"],"correct":1},
  {"question":"Estrutura lógica é:","options":["Desorganizada","Sequencial","Aleatória","Inexistente"],"correct":1},
  {"question":"Erro comum é:","options":["Planejar","Testar","Pular etapas","Analisar"],"correct":2},
  {"question":"Boa solução deve ser:","options":["Complexa","Testada","Incompleta","Confusa"],"correct":1},
  {"question":"Iteração significa:","options":["Repetição","Erro","Fim","Código"],"correct":0},
  {"question":"Abordagem correta inclui:","options":["Ignorar problema","Entender contexto","Evitar testes","Eliminar lógica"],"correct":1},
  {"question":"Dividir problema ajuda a:","options":["Complicar","Simplificar solução","Ignorar etapas","Eliminar análise"],"correct":1},
  {"question":"Teste final serve para:","options":["Ignorar erros","Confirmar solução","Eliminar código","Evitar validação"],"correct":1}
];

const LETTERS = ['A','B','C','D','E'];
let shuffled = [];
let current = 0;
let userAnswers = [];
let answered = [];

function deepShuffle() {
  shuffled = questions.map(q => {
    const correct = q.options[q.correct];
    const opts = [...q.options].sort(() => Math.random() - 0.5);
    return { question: q.question, options: opts, correct: opts.indexOf(correct) };
  });
  shuffled.sort(() => Math.random() - 0.5);
}

function startQuiz() {
  deepShuffle();
  userAnswers = new Array(shuffled.length).fill(null);
  answered    = new Array(shuffled.length).fill(false);
  current = 0;

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('totalQCount').textContent = shuffled.length;

  buildDots();
  renderQuestion(0);
}

function buildDots() {
  const wrap = document.getElementById('progressDots');
  wrap.innerHTML = '';
  shuffled.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot' + i;
    wrap.appendChild(d);
  });
}

function updateProgress(i) {
  const pct = ((i) / shuffled.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `Pergunta ${i + 1} de ${shuffled.length}`;
}

function renderQuestion(i) {
  const q = shuffled[i];
  const slot = document.getElementById('qSlot');

  const isLast = i === shuffled.length - 1;
  const isAnswered = answered[i];

  slot.innerHTML = `
    <div class="q-area q-anim">
      <div class="q-number">Questão ${i + 1}</div>
      <div class="q-text">${q.question}</div>
    </div>
    <div class="options" id="optList">
      ${q.options.map((opt, j) => {
        let cls = 'option';
        let icon = '';
        if (isAnswered) {
          cls += ' locked';
          if (j === userAnswers[i] && j !== q.correct) { cls += ' wrong'; icon = '✗'; }
          else if (j === q.correct) { cls += ' correct'; icon = '✓'; }
        }
        return `
        <div class="${cls}" id="opt${j}" onclick="selectOption(${i},${j})">
          <div class="opt-letter">${LETTERS[j]}</div>
          <div class="opt-text">${opt}</div>
          <div class="opt-icon">${icon}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="q-footer">
      <button class="btn btn-ghost" onclick="go(${i - 1})" ${i === 0 ? 'disabled' : ''}>← Anterior</button>
      <button class="btn ${isLast ? 'btn-finish' : 'btn-primary'}" id="nextBtn"
        onclick="${isLast ? 'finishQuiz()' : `go(${i + 1})`}"
        ${!isAnswered && !isLast ? '' : ''}>
        ${isLast ? '✓ Finalizar' : 'Próxima →'}
      </button>
    </div>
  `;

  updateProgress(i);
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;
  userAnswers[qIdx] = optIdx;

  const q = shuffled[qIdx];
  const opts = document.querySelectorAll('.option');

  opts.forEach((el, j) => {
    el.classList.add('locked');
    if (j === optIdx && j !== q.correct) { el.classList.add('wrong');   el.querySelector('.opt-icon').textContent = '✗'; el.querySelector('.opt-icon').style.opacity=1; }
    if (j === q.correct)                  { el.classList.add('correct'); el.querySelector('.opt-icon').textContent = '✓'; el.querySelector('.opt-icon').style.opacity=1; }
  });

  // Update dot
  const dot = document.getElementById('dot' + qIdx);
  dot.classList.add(optIdx === q.correct ? 'correct' : 'wrong');

  // Re-render footer to update button state
  const isLast = qIdx === shuffled.length - 1;
  document.getElementById('nextBtn').className =
    'btn ' + (isLast ? 'btn-finish' : 'btn-primary');
}

function go(i) {
  if (i < 0 || i >= shuffled.length) return;
  current = i;
  renderQuestion(i);
}

function finishQuiz() {
  let score = 0;
  shuffled.forEach((q, i) => { if (userAnswers[i] === q.correct) score++; });

  const pct = Math.round((score / shuffled.length) * 100);
  const circumference = 345.4;

  document.getElementById('quizArea').style.display = 'none';
  const res = document.getElementById('resultsScreen');
  res.style.display = 'block';

  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = shuffled.length - score;

  const msgs = [
    [100, '🏆 Perfeito!',         'Você acertou tudo. Incrível!'],
    [ 80, '🎉 Excelente!',        'Ótimo desempenho, quase lá!'],
    [ 60, '👍 Bom trabalho!',     'Você está no caminho certo.'],
    [  0, '📚 Continue estudando', 'Revise o conteúdo e tente novamente.'],
  ];
  const [, headline, msg] = msgs.find(([min]) => pct >= min);
  document.getElementById('resultHeadline').textContent = headline;
  document.getElementById('resultMsg').textContent = msg;

  // Animate ring
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    document.getElementById('ringFill').style.strokeDashoffset = offset;
  }, 80);
}

function restartQuiz() {
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
}
</script>
