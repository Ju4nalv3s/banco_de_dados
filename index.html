<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz - Desenvolvimento Web</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; padding: 20px; background:#f5f5f5; }

.screen { display: none; }
.screen.active { display: block; }

.card { background: white; padding: 20px; border-radius: 10px; }

button { padding:10px; margin-top:10px; cursor:pointer; }

.opt {
  border:1px solid #ccc;
  padding:10px;
  margin:5px 0;
  cursor:pointer;
}
.opt:hover { background:#eee; }
.correct { background:#c8f7c5; }
.wrong { background:#f7c5c5; }

</style>
</head>
<body>

<div id="startScreen" class="screen active card">
  <h1>Quiz - Desenvolvimento Web</h1>
  <button onclick="startQuiz()">Começar</button>
</div>

<div id="quizScreen" class="screen card">
  <h2 id="qText"></h2>
  <div id="opts"></div>
  <button onclick="nextQuestion()">Próxima</button>
</div>

<div id="resultScreen" class="screen card">
  <h2>Resultado</h2>
  <p id="result"></p>
  <button onclick="location.reload()">Reiniciar</button>
</div>

<script>
const ALL_QUESTIONS = [
  {question:"O que é um sistema?",options:["Um conjunto de elementos que trabalham juntos","Um navegador","Uma linguagem","Banco"],correct:0},
  {question:"Partes de um sistema:",options:["Entrada, processamento e saída","HTML, CSS, JS","Cliente e servidor","Login e senha"],correct:0},
  {question:"Entrada é:",options:["Resultado","Dados inseridos","Erro","Código"],correct:1},
  {question:"Processamento é:",options:["Entrada","Transformação","Saída","Banco"],correct:1},
  {question:"Saída é:",options:["Entrada","Resultado","Código","Erro"],correct:1},

  {question:"Cliente é:",options:["Servidor","Usuário","Banco","CSS"],correct:1},
  {question:"Servidor faz:",options:["Mostrar tela","Processar","CSS","HTML"],correct:1},
  {question:"HTTP é:",options:["Protocolo","Linguagem","Banco","Servidor"],correct:0},
  {question:"HTTPS é:",options:["Seguro","Lento","Inseguro","Local"],correct:0},

  {question:"Interface é:",options:["Comunicação usuário-sistema","Banco","Código","Servidor"],correct:0},
  {question:"GUI é:",options:["Gráfica","Texto","Código","Banco"],correct:0},
  {question:"IHC estuda:",options:["Usuários","Banco","CSS","Servidor"],correct:0},

  {question:"HTML significa:",options:["Hyper Text Markup Language","Outra coisa","Código","Banco"],correct:0},
  {question:"HTML serve para:",options:["Estrutura","Estilo","Banco","Servidor"],correct:0},
  {question:"Maior título:",options:["h1","h6","title","p"],correct:0},
  {question:"Parágrafo:",options:["p","div","text","span"],correct:0},

  {question:"Lista não ordenada:",options:["ul","ol","li","list"],correct:0},
  {question:"Lista ordenada:",options:["ol","ul","li","list"],correct:0},

  {question:"Link:",options:["a","link","href","url"],correct:0},
  {question:"Atributo link:",options:["href","src","alt","url"],correct:0},

  {question:"Imagem:",options:["img","image","pic","src"],correct:0},
  {question:"Alt serve para:",options:["Descrição","Cor","Tamanho","Link"],correct:0},

  {question:"Formulário:",options:["form","input","label","button"],correct:0},

  {question:"CSS significa:",options:["Cascading Style Sheets","Outro","Código","Banco"],correct:0},
  {question:"CSS serve para:",options:["Visual","Estrutura","Banco","Servidor"],correct:0},

  {question:"CSS inline:",options:["Na tag","Arquivo","Servidor","Banco"],correct:0},
  {question:"CSS interno:",options:["style","body","html","head"],correct:0},
  {question:"CSS externo:",options:["arquivo","tag","script","banco"],correct:0},

  {question:"Classe:",options:[".classe","#classe","classe","*classe"],correct:0},
  {question:"ID:",options:["#id",".id","id","*id"],correct:0},

  {question:"Box model:",options:["margin padding border","flex","html","cores"],correct:0},
  {question:"Padding:",options:["Interno","Externo","Borda","Fonte"],correct:0},
  {question:"Margin:",options:["Externo","Interno","Borda","Fonte"],correct:0},

  {question:"Flexbox:",options:["Layout","Texto","Banco","Imagem"],correct:0},
  {question:"display flex:",options:["Ativa flex","Desativa","Cor","Fonte"],correct:0},

  {question:"Responsividade:",options:["Adaptar telas","Banco","Servidor","Código"],correct:0},
  {question:"Media query:",options:["Responsivo","Banco","Texto","Imagem"],correct:0}
];

let current = 0;
let score = 0;

function startQuiz(){
  document.getElementById("startScreen").classList.remove("active");
  document.getElementById("quizScreen").classList.add("active");
  showQuestion();
}

function showQuestion(){
  let q = ALL_QUESTIONS[current];
  document.getElementById("qText").innerText = q.question;

  let opts = "";
  q.options.forEach((opt,i)=>{
    opts += `<div class="opt" onclick="checkAnswer(${i})">${opt}</div>`;
  });
  document.getElementById("opts").innerHTML = opts;
}

function checkAnswer(i){
  let q = ALL_QUESTIONS[current];
  if(i === q.correct) score++;

  document.querySelectorAll(".opt").forEach((el,index)=>{
    if(index === q.correct) el.classList.add("correct");
    else if(index === i) el.classList.add("wrong");
  });
}

function nextQuestion(){
  current++;
  if(current >= ALL_QUESTIONS.length){
    showResult();
  } else {
    showQuestion();
  }
}

function showResult(){
  document.getElementById("quizScreen").classList.remove("active");
  document.getElementById("resultScreen").classList.add("active");
  document.getElementById("result").innerText = "Acertos: " + score + "/" + ALL_QUESTIONS.length;
}
</script>

</body>
</html>
