<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionário</title>

<style>
/* (mantive seu CSS original resumido) */
body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}
.container {
    max-width:800px;
    margin:auto;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
}
.header {
    background:#2c3e50;
    color:#fff;
    padding:20px;
    text-align:center;
}
.question-container { display:none; padding:20px; }
.question-container.active { display:block; }
.option {
    border:1px solid #ccc;
    padding:10px;
    margin:8px 0;
    cursor:pointer;
}
.correct { background:#d4edda; }
.incorrect { background:#f8d7da; }
.selected { background:#e8f4fd; }
</style>

</head>

<body>

<div class="container">
    <div class="header">
        <h2>Questionário</h2>
    </div>

    <div id="startScreen" style="padding:20px;text-align:center;">
        <button onclick="startQuiz()">Iniciar</button>
    </div>

    <div id="questionsContainer"></div>

    <div id="results" style="display:none;text-align:center;padding:20px;">
        <h2>Resultado</h2>
        <p id="scoreText"></p>
        <button onclick="restartQuiz()">Refazer</button>
    </div>
</div>

<script>

// ✅ QUESTÕES CORRIGIDAS (sem array duplo)
const questions = [
{
"question":"O que caracteriza o refinamento sucessivo?",
"options":["Resolver tudo de uma vez","Aprimorar em etapas","Ignorar testes","Evitar revisões"],
"correct":1
},
{
"question":"O que é visão sistêmica?",
"options":["Olhar isolado","Ignorar contexto","Entender o todo","Focar só no código"],
"correct":2
},
{
"question":"O que é algoritmo?",
"options":["Erro","Sequência lógica","Interface","Banco"],
"correct":1
},
{
"question":"O que é abstração?",
"options":["Ignorar tudo","Focar no essencial","Complicar","Eliminar dados"],
"correct":1
},
{
"question":"Feedback loop é:",
"options":["Erro","Retorno de informação","Código duplicado","Teste"],
"correct":1
}
];

// ✅ EMBARALHAR RESPOSTAS
function shuffleQuestions() {
    questions.forEach(q => {
        const correct = q.options[q.correct];
        q.options.sort(() => Math.random() - 0.5);
        q.correct = q.options.indexOf(correct);
    });
}

let currentQuestion = 0;
let userAnswers = [];

function startQuiz() {
    shuffleQuestions();
    document.getElementById('startScreen').style.display='none';
    generateQuestions();
    showQuestion(0);
}

function generateQuestions() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = "";

    questions.forEach((q,index)=>{
        const div = document.createElement('div');
        div.className='question-container';
        div.id='q'+index;

        div.innerHTML = `
        <h3>${index+1}. ${q.question}</h3>
        ${q.options.map((opt,i)=>`
            <div class="option" onclick="selectOption(${index},${i})">
                ${opt}
            </div>
        `).join('')}
        <br>
        <button onclick="prev()">Voltar</button>
        <button onclick="next()">Próximo</button>
        `;
        container.appendChild(div);
    });
}

function showQuestion(i){
    document.querySelectorAll('.question-container').forEach(q=>q.classList.remove('active'));
    document.getElementById('q'+i).classList.add('active');
    currentQuestion=i;
}

function selectOption(qIndex,optIndex){
    const opts = document.querySelectorAll(`#q${qIndex} .option`);
    opts.forEach(o=>o.classList.remove('selected','correct','incorrect'));

    const selected = opts[optIndex];
    selected.classList.add('selected');

    userAnswers[qIndex]=optIndex;

    if(optIndex===questions[qIndex].correct){
        selected.classList.add('correct');
    } else {
        selected.classList.add('incorrect');
        opts[questions[qIndex].correct].classList.add('correct');
    }
}

function next(){
    if(currentQuestion < questions.length-1){
        showQuestion(currentQuestion+1);
    } else {
        finishQuiz();
    }
}

function prev(){
    if(currentQuestion>0){
        showQuestion(currentQuestion-1);
    }
}

function finishQuiz(){
    let score=0;
    questions.forEach((q,i)=>{
        if(userAnswers[i]===q.correct) score++;
    });

    document.getElementById('questionsContainer').style.display='none';
    document.getElementById('results').style.display='block';
    document.getElementById('scoreText').innerText = `Você acertou ${score} de ${questions.length}`;
}

function restartQuiz(){
    location.reload();
}

</script>

</body>
</html>
